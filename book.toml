[book]
authors = ["Remo Senekowitsch", "LaneSun"]
language = "zh"
src = "src"
title = "Jujutsu for everyone（中文版）"
description = "Jujutsu 教程中文翻译版，无需任何 Git 或其他版本控制系统经验。"

[output.html]
default-theme = "latte"
preferred-dark-theme = "macchiato"
additional-css = [
  "theme/mdbook-admonish.css",
  "theme/catppuccin.css",
  "theme/catppuccin-admonish.css",
  # custom
  "theme/aha_styles.css",
  "theme/mdbook-admonish-custom.css",
]
git-repository-url = "https://github.com/LaneSun/jj-for-everyone-zh_CN.github.io"
edit-url-template = "https://github.com/LaneSun/jj-for-everyone-zh_CN.github.io/edit/main/{path}"
no-section-label = true

[preprocessor.admonish]
command = "mdbook-admonish"
assets_version = "3.1.0" # do not edit: managed by `mdbook-admonish install`

[[preprocessor.admonish.custom]]
directive = "reset"
icon = "./theme/reset.svg"
color = "#9e9e9e" # same as "quote"
